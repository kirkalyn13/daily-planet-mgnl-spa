class: info.magnolia.rendering.spa.renderer.SpaRenderableDefinition

baseUrl: http://localhost:8181
routeTemplate: '/articles/{language}{{@path}}'

areas:
  main:
    title: Main Area
    availableComponents:
      Hero:
        id: daily-planet-lm:components/hero
      Text:
        id: daily-planet-lm:components/text
      TextImage:
        id: daily-planet-lm:components/textImage
      LinkList:
        id: daily-planet-lm:components/linkList

  footer:
    title: Footer Area
    inheritance:
      enabled: true
      components: all


  
