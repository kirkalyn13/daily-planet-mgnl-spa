label: Article Properties
form:
  $type: tabbedForm
  tabs:
    baseProperties:
      label: Base Properties
      fields:
        title:
          label: Title
          $type: textField
          i18n: true
        author:
          label: Author
          $type: textField
          i18n: true
        publishDate:
          $type: dateField
          label: Publish Date
          type: java.util.Date
          dateFormat: MMM d, yyyy
        readTime:
          label: Read Time (min)
          $type: textField
          type: java.lang.Integer
          converterClass: com.vaadin.data.converter.StringToIntegerConverter
    hero:
      label: Hero
      fields:
        heroImage:
          label: Image
          $type: damLinkField
          required: true
          i18n: true
        heroTitle:
          label: Title
          $type: textField
          i18n: true
        subtitle:
          label: Subtitle
          $type: textField
          i18n: true
        description:
          label: Text
          $type: textField
          rows: 5
          i18n: true